<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" aria-label="dashboard-mascot">
  <!-- 背景圆盘 -->
  <circle cx="60" cy="60" r="56" fill="#e6f0ff"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#c7dbfa" stroke-width="1"/>

  <!-- 学士帽 -->
  <g transform="translate(60 46)">
    <!-- 帽顶（菱形） -->
    <polygon points="0,-18 30,-6 0,6 -30,-6" fill="#2080f0"/>
    <polygon points="0,-18 30,-6 0,6 -30,-6" fill="none" stroke="#1664c0" stroke-width="1"/>
    <!-- 帽身（梯形） -->
    <path d="M-18,3 L18,3 L14,14 L-14,14 Z" fill="#1664c0"/>
    <!-- 帽顶按钮 + 流苏 -->
    <circle cx="0" cy="-10" r="2.5" fill="#f0a020"/>
    <path d="M0,-10 Q8,-4 10,6 Q11,12 8,16" fill="none" stroke="#f0a020" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="8" cy="17" r="2" fill="#f0a020"/>
  </g>

  <!-- 笑脸 -->
  <g transform="translate(60 76)">
    <circle cx="-9" cy="0" r="2" fill="#333"/>
    <circle cx="9" cy="0" r="2" fill="#333"/>
    <path d="M-7,7 Q0,13 7,7" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 底部书本 -->
  <g transform="translate(60 100)">
    <rect x="-22" y="-6" width="44" height="10" rx="1.5" fill="#fff" stroke="#2080f0" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="4" stroke="#2080f0" stroke-width="1"/>
    <line x1="-18" y1="-2" x2="-4" y2="-2" stroke="#c7dbfa" stroke-width="1"/>
    <line x1="4" y1="-2" x2="18" y2="-2" stroke="#c7dbfa" stroke-width="1"/>
  </g>
</svg>
